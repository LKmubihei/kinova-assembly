    position_pid:
      L-J1: { p: 80.0, i: 0.05, d: 8.0 }
      L-J2: { p: 80.0, i: 0.05, d: 8.0 }
      L-J3: { p: 80.0, i: 0.05, d: 8.0 }
      L-J4: { p: 80.0, i: 0.05, d: 8.0 }
      L-J5: { p: 80.0, i: 0.05, d: 8.0 }
      L-J6: { p: 80.0, i: 0.05, d: 8.0 }
      L-J7: { p: 80.0, i: 0.05, d: 8.0 }

body_controller:
  ros__parameters:
    joints: 
      - J1
      - Body

    interface_name:
      - position_pid

    command_interfaces:
      - position

    state_interfaces:
      - position
      - velocity

    position_pid:
      J1: { p: 80.0, i: 0.05, d: 8.0 }
      Body: { p: 80.0, i: 0.05, d: 8.0 }

head_controller:
  ros__parameters:
    joints: 
      - H-J1
      - H-J2
        
    interface_name:
