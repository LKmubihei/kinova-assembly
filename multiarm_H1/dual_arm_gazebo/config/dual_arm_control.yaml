  ros__parameters:
    joints: 
      - R-J1
      - R-J2
      - R-J3
      - R-J4
      - R-J5
      - R-J6
      - R-J7

    interface_name:
      - position

    command_interfaces:
      - position

    state_interfaces:
      - position
