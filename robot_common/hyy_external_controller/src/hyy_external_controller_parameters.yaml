hyy_external_controller:
  joints: {
    type: string_array,
    default_value: [],
    description: "Name of the joints to control",
  }
  state_interfaces: {
    type: string_array,
    default_value: [],
    description: "Name of the interfaces to state",
  }
  command_interfaces: {
    type: string_array,
    default_value: [],
    description: "Name of the interfaces to command",
  }
  force_sensor_name: {
    type: string_array,
    default_value: [],
    description: "Name of the sensors to control",
  }
  if_add_force_sensor: {
    type: int,
    default_value: 0,  
    description: "If add force sensor",
  }
  if_add_gripper: {
    type: int,
    default_value: 0,  
    description: "If add gripper",
  }
  if_add_hand: {
    type: int,
    default_value: 0,  
    description: "If add hand",
  }
  port_gripper: {
    type: string,
    default_value: "/dev/ttyUSB0" ,  
    description: "Serial port",
  }
  baudrate_gripper: {
    type: int,
    default_value: 115200,  
    description: "Serial Baudrate",
  }
  port_hand: {
    type: string,
    default_value: "/dev/ttyUSB0" ,  
    description: "Serial port",
  }
  baudrate_hand: {
    type: int,
    default_value: 115200,  
    description: "Serial Baudrate",
  }
